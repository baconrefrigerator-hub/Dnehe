<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>dead_hall.exe</title>
<style>
  html,body {
    margin:0; padding:0; background:#0a0a0f; overflow:hidden; touch-action:none;
    display:flex; align-items:center; justify-content:center; height:100vh;
    font-family: 'Courier New', Courier, monospace;
  }
  #wrap {
    position:relative; width:100%; max-width:1024px; aspect-ratio:16/9;
    box-shadow: 0 0 0 4px #1a1a24, 0 0 60px rgba(0,0,0,.8);
    background:#000;
  }
  canvas {
    display:block; width:100%; height:100%;
    image-rendering:pixelated; image-rendering:crisp-edges;
  }
  #crt {
    position:absolute; inset:0; pointer-events:none;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0px 2px, transparent 2px 4px);
    mix-blend-mode: multiply;
    opacity:.35;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="crt"></div>
</div>
<script>
// === ENGINE SETUP ===
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;
const W=480, H=270, TILE=24;
cv.width=W; cv.height=H;

// === INPUT ===
const keys={};
const joy={on:0,dx:0,dy:0,id:-1};
const btn={on:0,id:-1};

window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['Space','Enter','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup',e=>keys[e.code]=false);

function getPos(t){
  const r=cv.getBoundingClientRect();
  const s=W/r.width;
  return {x:(t.clientX-r.left)*s, y:(t.clientY-r.top)*s};
}
cv.addEventListener('touchstart',e=>{
  for(let t of e.changedTouches){
    const p=getPos(t);
    if(p.x<W/2){ joy.on=1; joy.id=t.identifier; joy.dx=joy.dy=0; }
    else{ btn.on=1; btn.id=t.identifier; }
  }
},{passive:false});
window.addEventListener('touchmove',e=>{
  for(let t of e.changedTouches){
    if(joy.on && t.identifier===joy.id){
      const p=getPos(t); const dx=p.x-60, dy=p.y-210;
      const d=Math.hypot(dx,dy);
      if(d>18){ joy.dx=(dx/d)*18; joy.dy=(dy/d)*18; }
      else{ joy.dx=dx; joy.dy=dy; }
    }
  }
},{passive:false});
window.addEventListener('touchend',e=>{
  for(let t of e.changedTouches){
    if(joy.on && t.identifier===joy.id){ joy.on=0; joy.dx=joy.dy=0; }
    if(btn.on && t.identifier===btn.id){ btn.on=0; }
  }
});

function act(){ return keys.Space||keys.Enter||keys.KeyZ||btn.on; }
let actPrev=false;

// === PALETTE (messy & human) ===
const C={
  bg:'#0f111a', wall:'#1a1c2e', wallHi:'#252840', wallLo:'#0d0f1a',
  floor:'#141620', floorAlt:'#181b26', blood1:'#5c1a1a', blood2:'#3d0f0f',
  player:'#5b8cff', skin:'#e2b29c', hair:'#3e2723', pants:'#1e2338',
  npc1:'#67e8f9', npc2:'#86efac', stalker:'#1a0505', eye:'#ff3333',
  fuse:'#fbbf24', note:'#f8fafc', gold:'#fcd34d', white:'#e2e8f0', gray:'#64748b'
};

// === MAPS ===
// #:wall .:floor b:blood >:stairs d:door S:start
const MAPS=[
  { // 0 LOBBY
    dark:0.6, light:120,
    intro:"ugh... my head... where is this?",
    grid:[
      "########################",
      "#.......#..............#",
      "#..N....#..............#",
      "#.......#.....####.....#",
      "#.......#.....#..#.....#",
      "####.####..............#",
      "#......................#",
      "#.......T..............#",
      "#......................#",
      "#..............####....#",
      "#..............#..#....#",
      "#..............#..#....#",
      "#####.##########..#....#",
      "#..............#..#....#",
      "#..............####....#",
      "#....S.................#",
      "#......................#",
      "########################"
    ],
    ents:[
      {id:'milo',type:'npc',tx:3,ty:2,face:1,lines:["oh!! hey!!","i've been stuck here for..","..i dont know how long.","my brother went east.","but the door needs a code.","mr mop guy knows something.."]},
      {id:'note',type:'item',tx:7,ty:7,name:'Scribbled Note',color:C.note,msg:"the paper is soaked.. '1027' ..written in crayon?"},
      {id:'east_door',type:'door',tx:13,ty:12,to:1,tox:1,toy:12,locked:true,code:'readNote',lockedMsg:"a keypad. ENTER 4 DIGITS..."}
    ]
  },
  { // 1 EAST WING (blood & janitor)
    dark:0.75, light:90,
    grid:[
      "########################",
      "#b....b#......b........#",
      "#.####.#.####.#######..#",
      "#.#..#.#.#..#.#.....#..#",
      "#.#..#...#..#.#...J.#..#",
      "#.#..#####..#.#.....#..#",
      "#.#..........#.#####.#.#",
      "#.####.######.#......#.#",
      "#......#b....b..######.#",
      "#########.####.#......b#",
      "#.........#..#.#.#####.#",
      "#.#########..#.#.#...#.#",
      "#.#..........#...#.#...#",
      "#.#.##########.###.#####",
      "#..............#.......#",
      "########################"
    ],
    ents:[
      {id:'janitor',type:'npc',tx:18,ty:4,face:-1,lines:["*sweep sweep*","yer not supposed to be here.","the basement's hungry.","take this fuse.","dont look at the dark too long."]},
      {id:'fuse_a',type:'item',tx:9,ty:7,name:'Fuse A',color:C.fuse,msg:"a heavy fuse. it vibrates in ur hand."},
      {id:'back_door',type:'door',tx:1,ty:12,to:0,tox:5,toy:12,locked:false}
    ]
  },
  { // 2 BASEMENT (chase)
    dark:0.92, light:60,
    grid:[
      "#######################",
      "#bbbbbbbbbbbbbbbbbbbbb#",
      "#b...................b#",
      "#b.############.####.b#",
      "#b.#.bbbbbbbb.#.#..#.b#",
      "#b.#..........#.#..#.b#",
      "#b.#.########.#.##.#.b#",
      "#b.#.#......#.#....#.b#",
      "#b.#.#.####.#.######.b#",
      "#b.#.#.#..#.#......#.b#",
      "#b.#.#.#F.#.######.#.b#",
      "#b.#.#.####.#......#.b#",
      "#b.#.#......#.####.#.b#",
      "#b.#.########.#..#.#.b#",
      "#b.#..........#..#.#.b#",
      "#b.############..##.b#",
      "#b..................b#",
      "#bbbbbbbbbbbbbbbbbbbb#",
      "#######################"
    ],
    ents:[
      {id:'fuse_b',type:'item',tx:9,ty:10,name:'Fuse B',color:C.gold,msg:"second fuse. the fluorescent lights buzz louder..."},
      {id:'basement_exit',type:'door',tx:11,ty:14,to:3,tox:2,toy:2,locked:true,code:'gotFuses',lockedMsg:"fuse panel needs 2 fuses."},
      {id:'stalker',type:'stalker',tx:10,ty:8,active:0}
    ]
  },
  { // 3 END ROOM
    dark:0.25, light:200,
    grid:[
      "#############",
      "#...........#",
      "#.S.........#",
      "#...........#",
      "#...........#",
      "#....P......#",
      "#...........#",
      "#############"
    ],
    ents:[
      {id:'panel',type:'panel',tx:5,ty:5,lines:["fuses slotted.","power surges.","a red door appears in the lobby.","wait.. it was always there?"]}
    ]
  }
];

// === STATE ===
let mode='title';
let area=0, walls=[], ents=[];
let player={x:0,y:0,vx:0,vy:0,dir:1,moving:0,idle:0,step:0};
let cam={x:0,y:0};
let inv=[];
let flags={readNote:0,gotA:0,gotB:0,gotFuses:0};
let chat=null; // {lines,idx,pos,tick,speaker}
let parts=[];
let shake=0;
let tick=0;
let stalker={x:0,y:0,on:0,speed:0.8};
let runActive=false;

function initArea(idx){
  area=idx; const d=MAPS[idx];
  walls=[]; ents=d.ents.map(e=>({...e}));
  for(let row of d.grid){
    walls.push(row.split('').map(c=>c==='#'?1:0));
  }
  // find S
  for(let y=0;y<d.grid.length;y++){
    const x=d.grid[y].indexOf('S');
    if(x>=0){ player.x=x*TILE+TILE/2; player.y=y*TILE+TILE/2; }
  }
  if(area===2){
    const s=ents.find(e=>e.id==='stalker');
    if(s){ stalker.x=s.tx*TILE+TILE/2; stalker.y=s.ty*TILE+TILE/2; stalker.on=0; }
  }
  if(d.intro && !flags['seen'+idx]){
    flags['seen'+idx]=1;
    queueChat('???', [{t:d.intro,g:0}]);
  }
}

initArea(0);

function queueChat(who,lines){
  mode='chat';
  chat={who,lines:[...lines],idx:0,pos:0,tick:0};
}

// === HELPERS ===
function solid(tx,ty){
  if(ty<0||ty>=walls.length||tx<0||tx>=walls[0].length) return 1;
  return walls[ty][tx];
}
function hitworld(x,y,r){
  const pts=[[-r,-r],[r,-r],[-r,r],[r,r],[0,-r],[0,r],[-r,0],[r,0]];
  for(let [px,py] of pts){
    const tx=Math.floor((x+px)/TILE), ty=Math.floor((y+py)/TILE);
    if(solid(tx,ty)) return 1;
  }
  return 0;
}

// === UPDATE ===
function update(){
  tick++;
  if(shake) shake--;

  // title
  if(mode==='title'){
    if(act() && !actPrev){ mode='play'; actPrev=true; }
    else if(!act()) actPrev=false;
    return;
  }
  // endings
  if(mode==='endA' || mode==='endB'){
    if(act() && !actPrev){ mode='title'; initArea(0); inv=[]; flags={}; actPrev=true; }
    else if(!act()) actPrev=false;
    return;
  }
  // death
  if(mode==='dead'){
    if(shake) shake--;
    if(tick%60<30 && !actPrev && act()){ mode='play'; initArea(area); actPrev=true; }
    else if(!act()) actPrev=false;
    return;
  }

  // chat
  if(mode==='chat'){
    chat.tick++;
    if(chat.tick%3===0 && chat.pos<chat.lines[chat.idx].t.length) chat.pos++;
    if(act() && !actPrev){
      actPrev=true;
      if(chat.pos<chat.lines[chat.idx].t.length) chat.pos=chat.lines[chat.idx].t.length;
      else{
        chat.idx++; chat.pos=0; chat.tick=0;
        if(chat.idx>=chat.lines.length){
          mode='play'; chat=null;
          // post-chat events
          if(flags.endChoice===1){ mode='endA'; }
          if(flags.endChoice===2){ mode='endB'; }
        }
      }
    }else if(!act()) actPrev=false;
    updateParts(); return;
  }

  // PLAY
  let mx=0,my=0;
  if(keys.ArrowUp||keys.KeyW) my=-1;
  if(keys.ArrowDown||keys.KeyS) my=1;
  if(keys.ArrowLeft||keys.KeyA) mx=-1;
  if(keys.ArrowRight||keys.KeyD) mx=1;
  if(joy.on){ mx=joy.dx/18; my=joy.dy/18; if(Math.hypot(mx,my)>1){const d=Math.hypot(mx,my);mx/=d;my/=d;} }

  const spd=(keys.ShiftLeft||keys.ShiftRight||runActive)?1.6:0.95;
  if(Math.hypot(mx,my)>0.1){
    player.vx+=(mx*spd-player.vx)*0.25;
    player.vy+=(my*spd-player.vy)*0.25;
    player.moving=1; player.idle=0; player.step++;
    if(mx>0.2) player.dir=1; else if(mx<-0.2) player.dir=-1;
  }else{ player.vx*=0.7; player.vy*=0.7; player.moving=0; player.idle++; }

  let nx=player.x+player.vx, ny=player.y+player.vy;
  if(!hitworld(nx,player.y,4.5)) player.x=nx; else{ player.vx*=-0.4; shake+=2; }
  if(!hitworld(player.x,ny,4.5)) player.y=ny; else{ player.vy*=-0.4; shake+=2; }

  const mw=walls[0].length*TILE, mh=walls.length*TILE;
  player.x=Math.max(6,Math.min(mw-6,player.x));
  player.y=Math.max(6,Math.min(mh-6,player.y));

  // foot dust
  if(player.moving && Math.hypot(player.vx,player.vy)>0.3 && player.step%10===0){
    parts.push({x:player.x+(Math.random()-.5)*6,y:player.y+6,vx:(Math.random()-.5)*.3,vy:-Math.random()*.4,life:25,col:(Math.random()>.8?C.blood1:'#334155')});
  }

  // cam follow
  cam.x+=(player.x-W/2-cam.x)*0.12; cam.y+=(player.y-H/2-cam.y)*0.12;
  cam.x=Math.max(0,Math.min(mw-W,cam.x)); cam.y=Math.max(0,Math.min(mh-H,cam.y));

  // entities interaction & activation
  const ad=MAPS[area];
  for(let e of ents){
    const ex=e.tx*TILE+TILE/2, ey=e.ty*TILE+TILE/2;
    const d=Math.hypot(player.x-ex,player.y-ey);
    // NPC proximity
    if(e.type==='npc' && d<18 && act() && !actPrev){
      actPrev=true; queueChat(e.id,e.lines); break;
    }
    // item pickup
    if(e.type==='item' && d<16 && act() && !actPrev){
      actPrev=true;
      if(e.id==='note') flags.readNote=1;
      if(e.id==='fuse_a') flags.gotA=1;
      if(e.id==='fuse_b'){ flags.gotB=1; triggerStalker(); }
      inv.push({name:e.name,col:e.color});
      queueChat('PICKED UP',[{t:e.msg,g:0}]);
      // remove from ents
      const i=ents.indexOf(e); if(i>-1) ents.splice(i,1);
      break;
    }
    // door
    if(e.type==='door' && d<16){
      if(act() && !actPrev){
        actPrev=true;
        if(e.locked){
          if(e.code==='readNote' && flags.readNote){ e.locked=false; queueChat('DOOR',[{t:'the lock clicks. 1027...',g:0}]); }
          else if(e.code==='gotFuses' && flags.gotA && flags.gotB){ e.locked=false; flags.gotFuses=1; queueChat('PANEL',[{t:'both fuses click into place.',g:0},{t:'the eastern wall hums...',g:1}]); }
          else{ queueChat('DOOR',[{t:e.lockedMsg||'locked.',g:0}]); }
        }else{
          // teleport
          initArea(e.to); player.x=e.tox*TILE+TILE/2; player.y=e.toy*TILE+TILE/2;
        }
        break;
      }
      // auto walk through unlocked
      if(!e.locked && d<10){ initArea(e.to); player.x=e.tox*TILE+TILE/2; player.y=e.toy*TILE+TILE/2; break; }
    }
    // panel
    if(e.type==='panel' && d<18 && act() && !actPrev){
      actPrev=true;
      if(flags.gotA && flags.gotB){
        flags.endChoice=1;
        queueChat('???',[ {t:'you slot both fuses.',g:0}, {t:'the whole building groans.',g:1}, {t:'red light spills from the lobby door.',g:1}, {t:'do you go back?',g:0} ]);
      }else{
        queueChat('PANEL',[{t:'needs 2 fuses.',g:0}]);
      }
      break;
    }
    // end trigger in lobby after fuses
    if(e.type==='door' && e.id==='east_door' && flags.gotFuses && d<18 && !e.toEnd){
      e.toEnd=true; e.locked=false;
    }
    if(e.type==='door' && e.toEnd && d<10){
      initArea(3); // actually we reuse simple choice
      // choice immediates
      flags.endChoice=Math.random()>.5?1:2;
      if(flags.endChoice===1) queueChat('END',[ {t:'the red door opens to your bedroom.',g:0}, {t:'it was a fever dream.',g:0}, {t:'but the floor is sticky.',g:1}, {t:'THE END (WAKE UP)',g:0} ]);
      else queueChat('END',[ {t:'the red door opens deeper inward.',g:0}, {t:'milo waves from a table.',g:0}, {t:'mr mop pours you juice.',g:0}, {t:'you decide to stay.',g:0}, {t:'THE END (STAY)',g:0} ]);
    }
  }

  // npc idle bob
  for(let e of ents) if(e.type==='npc') e.bob=Math.sin(tick*0.08+e.tx)*1.5;

  // STALKER AI
  if(area===2){
    const sdat=ents.find(e=>e.id==='stalker');
    if(stalker.on && sdat){
      const dx=player.x-stalker.x, dy=player.y-stalker.y, dst=Math.hypot(dx,dy);
      if(dst>4){
        stalker.x+=(dx/dst)*stalker.speed; stalker.y+=(dy/dst)*stalker.speed;
      }
      // jitter
      stalker.x+=(Math.random()-.5)*1.5; stalker.y+=(Math.random()-.5)*1.5;
      if(dst<10){ mode='dead'; shake=40; }
      if(dst<70) shake=Math.max(shake,3);
      // dust trail
      if(tick%4===0) parts.push({x:stalker.x,y:stalker.y+8,vx:(Math.random()-.5)*.5,vy:.2,life:20,col:'#2a0a0a'});
    }else if(stalker.on && !sdat){
      // stalker not in ents list but active? should not happen
    }
  }

  // psych particles
  if(ad.dark>0.8 && Math.random()<.08){
    parts.push({x:cam.x+Math.random()*W,y:cam.y+Math.random()*H,vx:0,vy:-.3,life:40,col:'#5c1a1a'});
  }

  updateParts();
}

function triggerStalker(){
  const s=ents.find(e=>e.id==='stalker');
  if(s){ stalker.on=1; s.active=1; }
}

function updateParts(){
  for(let p of parts){ p.x+=p.vx; p.y+=p.vy; p.life--; }
  parts=parts.filter(p=>p.life>0);
}

// === DRAW ===
function draw(){
  ctx.fillStyle=C.bg; ctx.fillRect(0,0,W,H);

  if(mode==='title'){ drawTitle(); return; }
  if(mode==='endA'){ drawEnd('WAKE UP','the sheets were never this cold before.'); return; }
  if(mode==='endB'){ drawEnd('STAY','the juice tastes like copper and sugar.'); return; }
  if(mode==='dead'){ drawDead(); return; }

  ctx.save();
  if(shake) ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  ctx.translate(-Math.floor(cam.x), -Math.floor(cam.y));

  const ad=MAPS[area];
  const gy=ad.grid.length, gx=ad.grid[0].length;
  const t0x=Math.max(0,Math.floor(cam.x/TILE)), t0y=Math.max(0,Math.floor(cam.y/TILE));
  const t1x=Math.min(gx,Math.ceil((cam.x+W)/TILE)), t1y=Math.min(gy,Math.ceil((cam.y+H)/TILE));

  // floor & walls
  for(let y=t0y;y<t1y;y++){
    for(let x=t0x;x<t1x;x++){
      const ch=ad.grid[y][x];
      const px=x*TILE, py=y*TILE;
      if(ch==='#'){
        ctx.fillStyle=C.wall; ctx.fillRect(px,py,TILE,TILE);
        ctx.fillStyle=C.wallHi; ctx.fillRect(px,py,TILE,3);
        ctx.fillStyle=C.wallLo; ctx.fillRect(px,py+TILE-4,TILE,4);
        // bricks
        ctx.fillStyle=C.wallHi; ctx.fillRect(px+2,py+6,8,2); ctx.fillRect(px+12,py+12,6,2);
      }else if(ch==='b'){
        ctx.fillStyle=C.floor; ctx.fillRect(px,py,TILE,TILE);
        // blood pools (deterministic)
        ctx.fillStyle=((x*7+y*13)%5<2)?C.blood1:C.blood2;
        if((x^y)%3===0) ctx.fillRect(px+2,py+8,10,6);
        if((x+y)%4===1) ctx.fillRect(px+14,py+4,6,4);
        ctx.fillStyle=C.blood1; ctx.fillRect(px+4,py+14,3,2);
      }else{
        ctx.fillStyle=((x+y)%2)?C.floor:C.floorAlt;
        ctx.fillRect(px,py,TILE,TILE);
        // floor grime
        if((x*3+y*11)%7===0){ ctx.fillStyle='#1a1e2e'; ctx.fillRect(px+8,py+8,3,3); }
      }
      // wall shadows from adjacent floors
      if(ch==='#' && y+1<gy && ad.grid[y+1][x]!=='#'){
        ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fillRect(px,py+TILE,TILE,6);
      }
    }
  }

  // sort entities + player by Y for depth
  const renderList=[...ents,{_player:true,y:player.y}];
  renderList.sort((a,b)=> (a.y||a.ty*TILE)-(b.y||b.ty*TILE));

  for(let e of renderList){
    if(e._player){ drawPlayer(player.x,player.y); continue; }
    const ex=e.tx*TILE+TILE/2, ey=e.ty*TILE+TILE/2;
    // skip if far offscreen
    if(ex<cam.x-30||ex>cam.x+W+30||ey<cam.y-30||ey>cam.y+H+30) continue;
    const px=e.tx*TILE, py=e.ty*TILE;

    if(e.type==='npc'){
      const b=e.bob||0;
      ctx.fillStyle='rgba(0,0,0,.35)'; ctx.fillRect(px+8,py+20,8,3);
      // body
      ctx.fillStyle=e.id==='milo'?C.npc1:C.npc2;
      ctx.fillRect(px+8,py+10+b,8,10);
      // head
      ctx.fillStyle='#f1c40f'; ctx.fillRect(px+8,py+4+b,8,6);
      // hair
      ctx.fillStyle='#3e2723'; ctx.fillRect(px+7,py+2+b,10,3);
      // face
      ctx.fillStyle='#111';
      if(e.face>0){ ctx.fillRect(px+12,py+6+b,2,2); } else { ctx.fillRect(px+10,py+6+b,2,2); }
      // legs
      ctx.fillStyle=C.pants;
      ctx.fillRect(px+9,py+20+b,2,3); ctx.fillRect(px+13,py+20+b,2,3);
      // icon
      if(e.id==='janitor'){
        ctx.fillStyle='#64748b'; ctx.fillRect(px+6,py+13+b,2,5); // mop handle
        ctx.fillStyle='#86efac'; ctx.fillRect(px+4,py+18+b,6,3);
      }
    }
    if(e.type==='item'){
      const bob=Math.sin(tick*0.12+e.tx)*3;
      ctx.fillStyle='rgba(0,0,0,.35)'; ctx.fillRect(px+9,py+20,6,2);
      ctx.fillStyle=e.color||C.white;
      if(e.id.includes('fuse')){
        ctx.fillRect(px+8,py+10+bob,8,10); ctx.fillStyle='#fff'; ctx.fillRect(px+10,py+12+bob,2,2);
      }else{
        ctx.fillRect(px+7,py+9+bob,10,8);
      }
    }
    if(e.type==='door'){
      ctx.fillStyle=e.locked?'#450a0a':'#334155';
      ctx.fillRect(px+2,py,20,24);
      ctx.fillStyle='#0f172a'; ctx.fillRect(px+5,py+3,14,18);
      ctx.fillStyle=e.locked?'#dc2626':'#22c55e';
      ctx.fillRect(px+10,py+10,4,4);
    }
    if(e.type==='panel'){
      ctx.fillStyle='#1e293b'; ctx.fillRect(px+4,py+4,18,16);
      ctx.fillStyle='#0ea5e9'; for(let i=0;i<3;i++) ctx.fillRect(px+6,py+6+i*4,4,2);
    }
    if(e.type==='stalker'){
      const sx=Math.sin(tick*0.6)*3;
      // flicker visibility based on distance
      const d=Math.hypot(player.x-ex,player.y-ey);
      const vis = d<40?1:(d<80?0.6:0.25);
      ctx.globalAlpha=vis;
      ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(px+6,py+22,12,4);
      ctx.fillStyle=C.stalker;
      ctx.fillRect(px+8+sx,py,8,24); // tall body
      ctx.fillRect(px+6+sx,py-4,12,6); // head
      // eyes
      ctx.fillStyle=C.eye; ctx.fillRect(px+8+sx,py-1,2,2); ctx.fillRect(px+12+sx,py-1,2,2);
      // mouth
      ctx.fillStyle='#7f1d1d'; ctx.fillRect(px+9+sx,py+2,4,1);
      ctx.globalAlpha=1;
    }
  }

  // particles
  for(let p of parts){
    ctx.globalAlpha=p.life/25;
    ctx.fillStyle=p.col;
    ctx.fillRect(p.x,p.y,2,2);
  }
  ctx.globalAlpha=1;

  ctx.restore(); // end cam

  // lighting overlay
  if(ad.dark>0){
    const g=ctx.createRadialGradient(player.x-cam.x,player.y-cam.y,10,player.x-cam.x,player.y-cam.y,ad.light);
    g.addColorStop(0,'rgba(0,0,0,0)');
    g.addColorStop(0.6,`rgba(0,0,0,${ad.dark*.5})`);
    g.addColorStop(1,`rgba(0,0,0,${ad.dark})`);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // vignette
    const vg=ctx.createRadialGradient(W/2,H/2,H/3,W/2,H/2,H);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.5)');
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  }

  // UI: Chat box
  if(mode==='chat'){
    const yb=H-46;
    ctx.fillStyle='rgba(10,10,15,0.95)';
    ctx.strokeStyle=C.white; ctx.lineWidth=1;
    ctx.fillRect(6,yb,W-12,40); ctx.strokeRect(6,yb,W-12,40);
    const line=chat.lines[chat.idx];
    let txt=line.t.substring(0,chat.pos);
    if(line.g && chat.pos>2 && chat.pos<line.t.length && Math.random()<.12){
      txt=txt.slice(0,-1)+['#','%','?','!','&'][Math.floor(Math.random()*5)];
      shake=Math.max(shake,1);
    }
    ctx.fillStyle=C.gray; ctx.font='9px monospace'; ctx.textBaseline='top';
    ctx.fillText(chat.who+':',10,yb+4);
    ctx.fillStyle=C.white; ctx.fillText(txt,10,yb+16);
    if(chat.pos>=line.t.length && Math.floor(tick/20)%2===0){
      ctx.fillStyle=C.white; ctx.fillText('▼',W-18,yb+30);
    }
  }

  // UI: inventory
  ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(4,4,90,14);
  ctx.fillStyle=C.gray; ctx.font='8px monospace'; ctx.textBaseline='top';
  ctx.fillText('POCKET:',7,6);
  inv.forEach((it,i)=>{ ctx.fillStyle=it.col; ctx.fillRect(48+i*12,5,8,10); });

  // UI: Touch hints
  if(joy.on || 'ontouchstart' in window){
    ctx.globalAlpha=0.2;
    ctx.strokeStyle=C.white; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(60,225,20,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle=C.white; ctx.beginPath(); ctx.arc(60+joy.dx,225+joy.dy,8,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#fb7185'; ctx.beginPath(); ctx.arc(420,225,16,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='#fb7185'; ctx.font='10px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('A',420,225); ctx.textAlign='left';
    ctx.globalAlpha=1;
  }

  // death tint if low on sanity
  if(area===2 && stalker.on){
    const dd=Math.hypot(player.x-stalker.x,player.y-stalker.y);
    if(dd<60){ ctx.fillStyle=`rgba(180,20,20,${1-dd/60})`; ctx.fillRect(0,0,W,H); }
  }
}

function drawPlayer(x,y){
  ctx.save(); ctx.translate(Math.floor(x), Math.floor(y));
  const bob=player.moving?Math.sin(player.step*0.5)*2:Math.sin(tick*0.06)*0.8;
  const breathe=(!player.moving&&player.idle>90)?Math.sin(tick*0.2)*1.2:0;
  const dir=player.dir;

  // shadow
  ctx.fillStyle='rgba(0,0,0,.35)'; ctx.fillRect(-5,7,10,3);

  // legs
  ctx.fillStyle=C.pants;
  if(player.moving){
    const s=Math.sin(player.step*0.5);
    ctx.fillRect(-4, 3+Math.max(0,s), 3, 4-Math.abs(s)*.8);
    ctx.fillRect(1, 3+Math.max(0,-s), 3, 4-Math.abs(s)*.8);
  }else if(player.idle>120){
    // fidget shift
    const sh=Math.sin(tick*0.15)*2;
    ctx.fillRect(-4+sh,3,3,4); ctx.fillRect(1-sh,3,3,4);
  }else{
    ctx.fillRect(-4,3,3,4); ctx.fillRect(1,3,3,4);
  }

  // body
  ctx.fillStyle=C.player; ctx.fillRect(-5,-2+bob+breathe,10,7);

  // arm sway / fidget
  ctx.fillStyle='#4a7de4';
  if(player.moving){
    const a=Math.sin(player.step*0.5)*2.5;
    ctx.fillRect(-7-a, -1+bob+breathe, 2, 5);
    ctx.fillRect(5+a, -1+bob+breathe, 2, 5);
  }else if(player.idle>90){
    // scratch head / look around
    const look=Math.sin(tick*0.08)*4;
    ctx.fillRect(-7+look, -1+bob+breathe, 2, 5);
    ctx.fillRect(5-look, -1+bob+breathe, 2, 5);
    if(player.idle>150 && tick%180<90){
      // hand on head
      ctx.fillStyle=C.skin; ctx.fillRect(dir===1?5:-6, -7+bob+breathe, 2, 3);
    }
  }else{
    ctx.fillRect(-7, -1+bob+breathe, 2, 5);
    ctx.fillRect(5, -1+bob+breathe, 2, 5);
  }

  // head
  ctx.fillStyle=C.skin; ctx.fillRect(-4.5,-7+bob+breathe,9,6);

  // hair (messy)
  ctx.fillStyle=C.hair;
  ctx.fillRect(-5,-9+bob+breathe,10,3);
  // bangs based on direction
  if(dir===1){
    ctx.fillRect(2,-9+bob+breathe,3,4);
  }else{
    ctx.fillRect(-5,-9+bob+breathe,3,4);
  }

  // eyes (wide if stalker near)
  ctx.fillStyle='#111';
  let eyeOff=(stalker.on && Math.hypot(player.x-stalker.x,player.y-stalker.y)<60)?1:0;
  if(dir===1){
    ctx.fillRect(1,-5.5+bob+breathe+eyeOff,1.5,2);
  }else{
    ctx.fillRect(-2.5,-5.5+bob+breathe+eyeOff,1.5,2);
  }

  // mouth (small o if idle too long/scared)
  ctx.fillStyle='#7f1d1d';
  if(stalker.on && Math.hypot(player.x-stalker.x,player.y-stalker.y)<80){
    ctx.fillRect(-1,-2+bob+breathe,2,2); // open mouth
  }else if(player.idle>60 && !player.moving){
    if(Math.sin(tick*0.05)>0) ctx.fillRect(-1,-2+bob+breathe,2,1);
  }

  ctx.restore();
}

function drawTitle(){
  const t=tick;
  const b=Math.sin(t*0.08)*3;
  ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,W,H);
  // noise
  for(let i=0;i<40;i++){
    ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.04})`;
    ctx.fillRect(Math.random()*W,Math.random()*H,2,2);
  }
  ctx.fillStyle=C.white; ctx.font='22px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('DEAD_HALL.EXE',W/2,80+b);
  ctx.fillStyle=C.gray; ctx.font='10px monospace';
  ctx.fillText('a game made at 3am by someone with too much caffeine',W/2,110);
  ctx.fillText('and not enough sleep',W/2,122);
  if(Math.floor(t/35)%2===0){
    ctx.fillStyle='#fb7185'; ctx.fillText('[ SPACE / TAP ] to start',W/2,160);
  }
  // tiny player sprite dancing
  ctx.save(); ctx.translate(W/2,190);
  drawPlayer(0,0); player.idle=200; player.step=tick;
  ctx.restore(); player.idle=0; player.step=0;
  ctx.textAlign='left';
}

function drawEnd(title,sub){
  ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle=C.white; ctx.font='16px monospace'; ctx.textAlign='center';
  ctx.fillText('THE END - '+title,W/2,100);
  ctx.fillStyle=C.gray; ctx.font='10px monospace';
  ctx.fillText(sub,W/2,124);
  if(Math.floor(tick/35)%2===0){
    ctx.fillStyle='#fb7185'; ctx.fillText('press SPACE / A to restart',W/2,160);
  }
  ctx.textAlign='left';
}

function drawDead(){
  ctx.fillStyle='rgba(80,10,10,0.6)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff'; ctx.font='12px monospace'; ctx.textAlign='center';
  ctx.fillText('IT GOT YOU.',W/2,H/2-10);
  ctx.fillStyle='#aaa'; ctx.font='9px monospace';
  ctx.fillText('press SPACE / A to try again',W/2,H/2+10);
  ctx.textAlign='left';
  // fake glitch lines
  for(let i=0;i<5;i++){
    ctx.fillStyle=`rgba(0,0,0,${Math.random()})`;
    ctx.fillRect(0,Math.random()*H,W,Math.random()*6);
  }
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
