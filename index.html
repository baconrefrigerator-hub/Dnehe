// ENGINE
// ==============================================================
const cv = document.getElementById('c');
const C = cv.getContext('2d');
C.imageSmoothingEnabled = false;
const W = 480, H = 270;
cv.width = W; cv.height = H;

const TILE = 16;

const FRICTION = 0.72;

const WALK_SPD = 1.0;
const RUN_SPD = 1.75;
const STAM_MAX = 120;

// ==============================================================
// AUDIO (simple retro beep)
// ==============================================================
let ACtx = null;
function beep(f=520, d=0.025, v=0.04, type='square'){
  if(!ACtx) ACtx = new (window.AudioContext||window.webkitAudioContext)();
  try {
    const o = ACtx.createOscillator();
    const g = ACtx.createGain();
    o.type = type;
    o.connect(g); g.connect(ACtx.destination);
    o.frequency.setValueAtTime(f, ACtx.currentTime);
    g.gain.setValueAtTime(v, ACtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ACtx.currentTime+d);
    o.start(); o.stop(ACtx.currentTime+d);
  }catch(e){}
}

// ==============================================================
// INPUT
// ==============================================================
const Keys = {};
const Joy = {on:0,dx:0,dy:0,id:-1};
const Btn = {a:0,b:0,aid:-1,bid:-1};

window.addEventListener('keydown',e=>{
  Keys[e.code]=true;
  if(['Space','Enter','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','ShiftLeft','ShiftRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup',e=>Keys[e.code]=false);

function getPos(t){
  const r=cv.getBoundingClientRect();
  const s=W/r.width;
  return {x:(t.clientX-r.left)*s, y:(t.clientY-r.top)*s};
}
cv.addEventListener('touchstart',e=>{
  for(let t of e.changedTouches){
    const p=getPos(t);
    if(p.x<W/2){ Joy.on=1; Joy.id=t.identifier; Joy.dx=Joy.dy=0; }
    else if(p.y>H-50){ Btn.b=1; Btn.bid=t.identifier; } // bottom right = run
    else { Btn.a=1; Btn.aid=t.identifier; } // upper right = action
  }
},{passive:false});
window.addEventListener('touchmove',e=>{
  for(let t of e.changedTouches){
    if(Joy.on && t.identifier===Joy.id){
      const p=getPos(t);
      const dx=p.x-60, dy=p.y-210, d=Math.hypot(dx,dy);
      if(d>18){ Joy.dx=(dx/d)*18; Joy.dy=(dy/d)*18; }
      else{ Joy.dx=dx; Joy.dy=dy; }
    }
  }
},{passive:false});
window.addEventListener('touchend',e=>{
  for(let t of e.changedTouches){
    if(Joy.on && t.identifier===Joy.id){ Joy.on=0; Joy.dx=Joy.dy=0; }
    if(Btn.a && t.identifier===Btn.aid){ Btn.a=0; }
    if(Btn.b && t.identifier===Btn.bid){ Btn.b=0; }
  }
});

function actDown(){ return Keys.Space||Keys.Enter||Keys.KeyZ||Btn.a; }
function runDown(){ return Keys.ShiftLeft||Keys.ShiftRight||Btn.b; }
let ActPrev=false;

    rect(18,26,4,4,P.black); rect(34,26,4,4,P.black); // pupils
    // blush

    // smile
    rect(22,40,12,2,P.black); rect(20,38,2,2,P.black); rect(34,38,2,2,P.black);

    rect(8,6,40,14,P.player); rect(12,4,32,4,P.player);

    rect(14,18,28,30,P.skin);

    rect(4,4,48,48,P.stalker);

    // glitch lines
    C.fillStyle='#fff'; C.globalAlpha=0.15; C.fillRect(0,16,56,2); C.fillRect(0,40,56,2); C.globalAlpha=1;
  }else if(type==='null'){
    rect(12,12,32,32,'#334155');
    rect(18,20,4,4,P.gray); rect(34,20,4,4,P.gray);
    rect(22,36,12,2,P.gray);
  }
  C.restore();
}

// ==============================================================
// STATE
// ==============================================================
let mode='title'; // title play chat dead winA winB
let area=0, walls=[], ents=[];
let player={x:0,y:0,vx:0,vy:0,dir:1,moving:0,idle:0,step:0,run:0,stam:STAM_MAX};
let cam={x:0,y:0};
let inv=[]; // {name,color}
let flags={readNote:0,gotA:0,gotB:0,gotFuses:0,seenStalker:0};
let chat=null;
let parts=[]; // particles
let shake=0;
let stalker={x:-999,y:-999,on:0,spd:0.85};
let tick=0;

function parseArea(idx){
  area=idx; const d=MAPS[idx]; walls=[]; ents=d.ents.map(e=>({...e}));
  for(let row of d.grid) walls.push(row.split('').map(c=>c==='#'?1:0));
  // spawn S
  for(let y=0;y<d.grid.length;y++){
    const x=d.grid[y].indexOf('S');
    if(x>=0){ player.x=x*TILE+8; player.y=y*TILE+8; }
  }
  if(d.intro && !flags['seen_'+idx]){
    flags['seen_'+idx]=1;
    startChat(d.intro.who, d.intro.f, [{t:d.intro.t,f:d.intro.f}]);
  }
  if(area===2){
    const s=ents.find(e=>e.id==='stalker');
    if(s){ stalker.x=s.tx*TILE+8; stalker.y=s.ty*TILE+8; stalker.on=0; }
  }
}

parseArea(0);

// ==============================================================
// GAMEPLAY HELPERS
// ==============================================================
function solid(tx,ty){
  if(ty<0||ty>=walls.length||tx<0||tx>=walls[0].length) return 1;
  return walls[ty][tx];
}
function colWorld(x,y,r){
  const pts=[[-r,-r],[r,-r],[-r,r],[r,r],[0,-r],[0,r],[-r,0],[r,0]];
  for(let [px,py] of pts){
    if(solid(Math.floor((x+px)/TILE), Math.floor((y+py)/TILE))) return 1;
  }
  return 0;
}

function startChat(who, face, lines){
  mode='chat'; chat={who,face,lines:[...lines],idx:0,pos:0,tm:0};
}
function advanceChat(){
  chat.idx++; chat.pos=0; chat.tm=0;
  if(chat.idx>=chat.lines.length){
    // post-chat hooks
    const last = chat.lines[chat.lines.length-1];
    chat=null; mode='play';
    // janitor gifts fuse after chat
    if(!flags.gotA && area===1){
      flags.gotA=1; inv.push({name:'Fuse A',col:P.fuse});
      startChat('MR. MOP','janitor',[{t:"* he shoves a fuse into your hands.",f:'janitor'},{t:"go on. git.",f:'janitor'}]);
      return;
    }
    // panel opens return
    if(flags.gotA && flags.gotB && area===3){
      flags.gotFuses=1;
      // teleport back to lobby with exit open
      parseArea(0);
      // replace east door with end trigger or open it
      const door=ents.find(e=>e.id==='east_door');
      if(door){ door.locked=false; door.toEnd=true; door.to=0; door.tox=20; door.toy=12; }
      startChat('???','player',[{t:"* the red door is open.",f:'player'},{t:"* it leads to your bedroom... or deeper?",f:'player'}]);
    }
  }
}

function kill(){
  mode='dead'; shake=35; setTimeout(()=>{ if(mode==='dead'){ mode='play'; parseArea(area); shake=0; } }, 2500);
}

// ==============================================================
// UPDATE
// ==============================================================
function update(){
  tick++;
  if(shake) shake--;

  if(mode==='title'){
    if(actDown() && !ActPrev){ mode='play'; ActPrev=true; }
    else if(!actDown()) ActPrev=false;
    return;
  }
  if(mode==='dead'){
    if(!actDown()) ActPrev=false;
    return;
  }
  if(mode==='winA' || mode==='winB'){
    if(actDown() && !ActPrev){ mode='title'; flags={}; inv=[]; parseArea(0); ActPrev=true; }
    else if(!actDown()) ActPrev=false;
    return;
  }

  if(mode==='chat'){
    chat.tm++;
    if(chat.tm%3===0 && chat.pos<chat.lines[chat.idx].t.length){
      chat.pos++;
      if(chat.tm%6===0) beep(700+Math.random()*200,0.02,0.03,'triangle');
    }
    if(actDown() && !ActPrev){
      ActPrev=true;
      if(chat.pos<chat.lines[chat.idx].t.length) chat.pos=chat.lines[chat.idx].t.length;
      else advanceChat();
    }else if(!actDown()) ActPrev=false;
    updateParts(); return;
  }

  // PLAY
  let mx=0,my=0;
  if(Keys.ArrowUp||Keys.KeyW) my=-1;
  if(Keys.ArrowDown||Keys.KeyS) my=1;
  if(Keys.ArrowLeft||Keys.KeyA) mx=-1;
  if(Keys.ArrowRight||Keys.KeyD) mx=1;
  if(Joy.on){ mx=Joy.dx/18; my=Joy.dy/18; const d=Math.hypot(mx,my); if(d>1){mx/=d;my/=d;} }

  const running = runDown() && player.stam>0;
  const spd = running ? RUN_SPD : WALK_SPD;
  if(running && (mx||my)){ player.stam--; player.run=1; } else { player.run=0; if(player.stam<STAM_MAX) player.stam+=0.4; }

  if(Math.hypot(mx,my)>0.1){
    player.vx+=(mx*spd-player.vx)*ACCEL;
    player.vy+=(my*spd-player.vy)*ACCEL;
    player.moving=1; player.idle=0; player.step++;
    if(mx>0.2) player.dir=1; else if(mx<-0.2) player.dir=-1;
  }else{ player.vx*=FRICTION; player.vy*=FRICTION; if(Math.abs(player.vx)<0.05)player.vx=0; if(Math.abs(player.vy)<0.05)player.vy=0; player.moving=0; player.idle++; }

  let nx=player.x+player.vx, ny=player.y+player.vy;
  if(!colWorld(nx,player.y,4.5)) player.x=nx; else{ player.vx=0; }
  if(!colWorld(player.x,ny,4.5)) player.y=ny; else{ player.vy=0; }

  const mw=walls[0].length*TILE, mh=walls.length*TILE;
  player.x=Math.max(6,Math.min(mw-6,player.x));
  player.y=Math.max(6,Math.min(mh-6,player.y));

  if(player.moving && Math.hypot(player.vx,player.vy)>0.3 && tick%8===0){
    parts.push({x:player.x+(Math.random()-.5)*6,y:player.y+7,vx:(Math.random()-.5)*.3,vy:-.2,life:22,col:(Math.random()>.85?P.blood:'#2e3440')});
  }

  cam.x+=(player.x-cam.x)*0.18; cam.y+=(player.y-cam.y)*0.18;

  // entity interactions
  let nearNpc=false;
  for(let e of ents){
    const ex=e.tx*TILE+8, ey=e.ty*TILE+8;
    const d=Math.hypot(player.x-ex,player.y-ey);
    if(d<18){
      if(e.type==='npc' && actDown() && !ActPrev){
        ActPrev=true; startChat(e.who||e.id, e.f||'null', e.lines.map(l=>(typeof l==='string'?{t:l,f:e.f||'null'}:l))); nearNpc=true; break;
      }
      if(e.type==='item' && actDown() && !ActPrev){
        ActPrev=true;
        if(e.id==='note') flags.readNote=1;
        if(e.id==='fuse_a') flags.gotA=1;
        if(e.id==='fuse_b'){ flags.gotB=1; }
        inv.push({name:e.name,col:e.color});
        startChat('FOUND', e.f||'null', [{t:e.msg,f:e.f||'player'}]);
        const i=ents.indexOf(e); if(i>-1) ents.splice(i,1); nearNpc=true; break;
      }
      if(e.type==='door' && d<16){
        if(actDown() && !ActPrev){
          ActPrev=true;
          if(e.locked){
            if((e.code==='readNote'&&flags.readNote)||(e.code==='gotFuses'&&flags.gotA&&flags.gotB)){
              e.locked=false; startChat('DOOR','null',[{t:'* the lock clicks open.',f:'null'}]);
            }else{
              startChat('DOOR',e.f||'null',[{t:e.lockedMsg,f:e.f||'null'}]);
            }
          }else{
            if(e.toEnd){
               // final choice
               const left = player.x < e.tx*TILE+8;
               if(left){
                 startChat('END','player',[
                   {t:"* you step through. pale morning light.",f:'player'},
                   {t:"* the sheets are wet with sweat.",f:'player'},
                   {t:"* a single yellow hair on the pillow.",f:'player'},
                   {t:"THE END (WAKE UP)",f:'null'}
                 ]); mode='winA';
               }else{
                 startChat('END','stalker',[
                   {t:"* the hall goes deeper.",f:'stalker'},
                   {t:"* milo pours you juice.",f:'milo'},
                   {t:"* mr mop nods. this is home now.",f:'janitor'},
                   {t:"THE END (STAY)",f:'null'}
                 ]); mode='winB';
               }
            }else{
              parseArea(e.to); player.x=e.tox*TILE+8; player.y=e.toy*TILE+8;
            }
          }
        }
        nearNpc=true; break;
      }
      if(e.type==='panel' && d<18 && actDown() && !ActPrev){
        ActPrev=true;
        if(flags.gotA && flags.gotB){
          // handled in advanceChat teleport
          startChat(e.who||'PANEL', e.f||'null', e.lines.map(l=>(typeof l==='string'?{t:l,f:e.f||'null'}:l)));
        }else{
          startChat('PANEL','null',[{t:"* two slots. both empty.",f:'null'}]);
        } nearNpc=true; break;
      }
    }
  }
  if(!actDown()) ActPrev=false;

  // auto-use unlocked doors
  if(!nearNpc) for(let e of ents){
    if(e.type==='door' && !e.locked && !e.toEnd){
      const ex=e.tx*TILE+8, ey=e.ty*TILE+8;
      if(Math.hypot(player.x-ex,player.y-ey)<9){ parseArea(e.to); player.x=e.tox*TILE+8; player.y=e.toy*TILE+8; break; }
    }
  }

  // npc bob
  for(let e of ents) if(e.type==='npc') e._bob=Math.sin(tick*0.1+e.tx)*1.4;

  // STALKER
  if(area===2){
    const se=ents.find(e=>e.id==='stalker');
    if(se && !stalker.on && flags.gotB){ stalker.on=1; }
    if(stalker.on){
      const dx=player.x-stalker.x, dy=player.y-stalker.y, dst=Math.hypot(dx,dy);
      if(dst>4){ stalker.x+=(dx/dst)*stalker.spd; stalker.y+=(dy/dst)*stalker.spd; }
      stalker.x+=(Math.random()-.5)*1.5; stalker.y+=(Math.random()-.5)*1.5;
      if(dst<10) kill();
      if(dst<80) shake=Math.max(shake,2);
      if(tick%4===0) parts.push({x:stalker.x,y:stalker.y+8,vx:(Math.random()-.5)*.4,vy:.1,life:18,col:'#2a0808'});
    }
  }

  // psych ambiance
  const ad=MAPS[area];
  if(ad.dark>0.8 && Math.random()<.06){
    parts.push({x:cam.x+(Math.random()-.5)*W/CAM_ZOOM,y:cam.y+(Math.random()-.5)*H/CAM_ZOOM,vx:0,vy:-.25,life:45,col:'#5c1018'});
  }

  updateParts();
}
function updateParts(){ for(let p of parts){ p.x+=p.vx; p.y+=p.vy; p.life--; } parts=parts.filter(p=>p.life>0); }

// ==============================================================
// RENDER
// ==============================================================
function draw(){
  C.fillStyle=P.bg; C.fillRect(0,0,W,H);

  if(mode==='title'){ drawTitle(); return; }
  if(mode==='winA'){ drawWin('WAKE UP','you open your eyes. the clock reads 3:33 am.'); return; }
  if(mode==='winB'){ drawWin('STAY','the walls breathe. you are not alone anymore.'); return; }
  if(mode==='dead'){ drawDead(); return; }

  C.save();
  if(shake) C.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);

  // CAMERA ZOOM AROUND PLAYER
  C.translate(W/2, H/2);
  C.scale(CAM_ZOOM, CAM_ZOOM);
  C.translate(-Math.floor(player.x), -Math.floor(player.y));

  const ad=MAPS[area];
  const gy=ad.grid.length, gx=ad.grid[0].length;
  const t0x=Math.max(0,Math.floor((player.x - W/(2*CAM_ZOOM))/TILE)-2);
  const t0y=Math.max(0,Math.floor((player.y - H/(2*CAM_ZOOM))/TILE)-2);
  const t1x=Math.min(gx,Math.ceil((player.x + W/(2*CAM_ZOOM))/TILE)+2);
  const t1y=Math.min(gy,Math.ceil((player.y + H/(2*CAM_ZOOM))/TILE)+2);

  // tiles
  for(let y=t0y;y<t1y;y++){
    for(let x=t0x;x<t1x;x++){
      const ch=ad.grid[y][x];
      const px=x*TILE, py=y*TILE;
      if(ch==='#'){
        rect(px,py,TILE,TILE,P.wall);
        rect(px,py,TILE,3,P.wallHi);
        rect(px,py+TILE-3,TILE,3,P.wallLo);
        // brick detail
        C.fillStyle=P.wallHi; rect(px+2,py+6,8,2); rect(px+10,py+12,4,2);
        // cracks
        if(((x*7+y*13)%11)<3){ C.fillStyle=P.wallLo; C.fillRect(px+4,py+10,2,6); }
      }else if(ch==='b'){
        rect(px,py,TILE,TILE,P.fl1);
        // blood pools
        C.fillStyle=P.darkb; if((x^y)%3===0) rect(px+2,py+8,10,6);
        C.fillStyle=P.blood; if((x+y)%4===1) rect(px+8,py+4,8,4);
        rect(px+3,py+13,4,2);
      }else{
        rect(px,py,TILE,TILE,((x+y)%2)?P.fl1:P.fl2);
        // grime
        if(((x*3+y*11)%9)===0){ C.fillStyle='#1c1f2a'; C.fillRect(px+6,py+6,3,3); }
      }
      // wall shadows cast down
      if(ch==='#' && y+1<gy && ad.grid[y+1][x]!=='#'){
        C.fillStyle='rgba(0,0,0,.45)'; C.fillRect(px,py+TILE,TILE,5);
      }
      // pipes on some walls
      if(ch==='#' && (x%5===0) && y>0 && ad.grid[y-1][x]==='#'){
        C.fillStyle='#0f111a'; C.fillRect(px+10,py-2,4,4);
      }
    }
  }

  // render list for depth sorting
  const list=[...ents,{_player:true,y:player.y+6}];
  list.sort((a,b)=>(a._player?a.y:(a.ty*TILE+16)) - (b._player?b.y:(b.ty*TILE+16)));

  for(let e of list){
    if(e._player){ drawPlayerSprite(player.x, player.y); continue; }
    const px=e.tx*TILE, py=e.ty*TILE;
    if(px<player.x-W/CAM_ZOOM-40 || px>player.x+W/CAM_ZOOM+40 || py<player.y-H/CAM_ZOOM-40 || py>player.y+H/CAM_ZOOM+40) continue;

    if(e.type==='npc'){
      const b=e._bob||0;
      C.fillStyle='rgba(0,0,0,.4)'; C.fillRect(px+6,py+22,12,3);
      // body
      C.fillStyle=e.f==='milo'?P.milo:P.janitor;
      rect(px+6,py+12+b,12,10);
      // head
      C.fillStyle='#f1c40f'; rect(px+6,py+4+b,12,9);
      // hair
      C.fillStyle='#332211'; rect(px+5,py+2+b,14,4);
      if(e.face===-1) rect(px+4,py+2+b,5,10); else rect(px+13,py+2+b,5,10);
      // eyes
      C.fillStyle='#111'; if(e.face>0) rect(px+11,py+7+b,2,2); else rect(px+9,py+7+b,2,2);
      // legs
      C.fillStyle=P.pants; rect(px+7,py+22+b,3,3); rect(px+14,py+22+b,3,3);
      // janitor mop
      if(e.id==='janitor'){ C.fillStyle='#475569'; C.fillRect(px+2,py+10+b,2,14); C.fillStyle=P.janitor; C.fillRect(px,py+22+b,6,4); }
    }
    if(e.type==='item'){
      const bob=Math.sin(tick*0.12+e.tx)*3;
      C.fillStyle='rgba(0,0,0,.4)'; C.fillRect(px+6,py+22,10,3);
      C.fillStyle=e.color||P.white;
      if(e.name.includes('Fuse')){ rect(px+7,py+10+bob,10,12); C.fillStyle='#fff'; rect(px+10,py+13+bob,3,3); }
      else{ rect(px+6,py+8+bob,12,10); C.fillStyle='#cbd5e1'; rect(px+8,py+10+bob,8,6); }
    }
    if(e.type==='door'){
      C.fillStyle=e.locked?P.darkb:'#334155';
      rect(px+2,py,20,24); rect(px+5,py+3,14,18,P.bg);
      C.fillStyle=e.locked?P.redeye:'#22c55e'; rect(px+11,py+10,4,4);
      // blood on locked door
      if(e.locked){ C.fillStyle=P.blood; C.fillRect(px+4,py+16,4,3); C.fillRect(px+14,py+18,3,2); }
    }
    if(e.type==='panel'){
      rect(px+4,py+4,18,16,'#1e293b'); rect(px+6,py+6,4,4,P.redeye); rect(px+14,py+6,4,4,P.gold); rect(px+6,py+14,12,2,'#475569');
    }
    if(e.type==='stalker'){
      const jitter=Math.sin(tick*0.8)*4;
      const d=Math.hypot(player.x-(px+8),player.y-(py+8));
      C.globalAlpha = d<50?1:(d<100?0.6:0.25);
      C.fillStyle='rgba(0,0,0,.6)'; C.fillRect(px+4,py+22,16,4);
      C.fillStyle=P.stalker; rect(px+6+jitter,py-2,12,28); rect(px+4+jitter,py-6,16,8);
      // eyes
      C.fillStyle=P.redeye; rect(px+8+jitter,py-2,4,4); rect(px+14+jitter,py-2,4,4);
      C.fillStyle='#fff'; rect(px+9+jitter,py-1,1,1); rect(px+15+jitter,py-1,1,1);
      // mouth
      C.fillStyle=P.redeye; rect(px+10+jitter,py+4,6,2); rect(px+8+jitter,py+2,2,2); rect(px+16+jitter,py+2,2,2);
      C.globalAlpha=1;
    }
  }

  // particles
  for(let p of parts){ C.globalAlpha=p.life/24; C.fillStyle=p.col; C.fillRect(p.x,p.y,2,2); }
  C.globalAlpha=1;

  // blood footprints behind player occasionally
  if(player.moving && tick%12===0 && area===2){
    C.fillStyle='rgba(60,10,10,0.35)'; C.fillRect(player.x-3,player.y+6,6,2);
  }

  C.restore(); // back to screen space

  // LIGHTING OVERLAY
  if(ad.dark>0){
    // flicker light radius in basement
    let lr = ad.lightR;
    if(area===2) lr += Math.sin(tick*0.9)*8 + (Math.random()*6);
    const g=C.createRadialGradient(W/2,H/2,10,W/2,H/2,lr*CAM_ZOOM);
    g.addColorStop(0,'rgba(0,0,0,0)');
    g.addColorStop(0.5,`rgba(0,0,0,${ad.dark*0.5})`);
    g.addColorStop(1,`rgba(0,0,0,${ad.dark})`);
    C.fillStyle=g; C.fillRect(0,0,W,H);
    // vignette
    const vg=C.createRadialGradient(W/2,H/2,H/4,W/2,H/2,H*0.9);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.45)');
    C.fillStyle=vg; C.fillRect(0,0,W,H);
  }

  // DIALOGUE BOX (undertale style)
  if(mode==='chat' && chat){
    const bx=12, by=H-92, bw=W-24, bh=80;
    C.fillStyle='rgba(0,0,0,0.92)'; C.strokeStyle=P.white; C.lineWidth=2;
    C.fillRect(bx,by,bw,bh); C.strokeRect(bx,by,bw,bh);
    // inner corners detail
    C.fillStyle=P.white; C.fillRect(bx+4,by+4,4,4); C.fillRect(bx+bw-8,by+4,4,4); C.fillRect(bx+4,by+bh-8,4,4); C.fillRect(bx+bw-8,by+bh-8,4,4);

    // name tag
    C.fillStyle='rgba(0,0,0,0.95)'; C.strokeStyle=P.white; C.lineWidth=1;
    const nameW = C.measureText(chat.who).width + 12;
    C.fillRect(bx+12,by-10,nameW,18); C.strokeRect(bx+12,by-10,nameW,18);
    C.fillStyle= chat.face==='stalker'?P.redeye:(chat.face==='milo'?P.milo:(chat.face==='janitor'?P.janitor:P.white));
    C.font='10px monospace'; C.textBaseline='middle'; C.fillText(chat.who,bx+18,by-1); C.textBaseline='top';

    // portrait box
    C.fillStyle='rgba(0,0,0,.6)'; C.strokeStyle=P.gray; C.lineWidth=1;
    C.fillRect(bx+8,by+12,60,60); C.strokeRect(bx+8,by+12,60,60);
    drawFace(chat.lines[chat.idx].f||chat.face, bx+10, by+14, 56);

    // text
    const line = chat.lines[chat.idx];
    let txt = line.t.substring(0,chat.pos);
    // glitch char replacement for spooky lines
    if(line.t.startsWith('*') && chat.pos>3 && chat.pos<line.t.length && Math.random()<.1){
      const arr=txt.split(''); arr[arr.length-1]=['#','%','?','!','&'][Math.floor(Math.random()*5)]; txt=arr.join('');
      shake=Math.max(shake,1);
    }
    C.fillStyle= line.t.startsWith('*') ? P.gray : P.white;
    C.font='11px monospace';
    // wrap text roughly (simple)
    const tx=bx+76, ty=by+18;
    const words=txt.split(''); let lineStr='', row=0;
    for(let i=0;i<words.length;i++){
      lineStr+=words[i];
      if(C.measureText(lineStr).width > bw-90 && words[i]===' '){
        C.fillText(lineStr,tx,ty+row*14); lineStr=''; row++;
      }
    }
    C.fillText(lineStr,tx,ty+row*14);

    // arrow
    if(chat.pos>=line.t.length && Math.floor(tick/25)%2===0){
      C.fillStyle=P.white; C.fillText('▼',bx+bw-18,by+bh-14);
    }
  }

  // HUD: pocket / stamina
  C.fillStyle='rgba(0,0,0,.5)'; C.fillRect(8,8,100,14);
  C.fillStyle=P.gray; C.font='8px monospace'; C.textBaseline='top'; C.fillText('POCKET:',12,10);
  inv.forEach((it,i)=>{ C.fillStyle=it.col; C.fillRect(54+i*12,9,8,10); });
  // stamina bar if running
  if(player.run || player.stam<STAM_MAX){
    C.fillStyle='rgba(0,0,0,.5)'; C.fillRect(8,24,60,6);
    C.fillStyle=player.stam<30?P.redeye:'#22c55e'; C.fillRect(10,26,(56)*(player.stam/STAM_MAX),3);
  }

  // touch controls hint
  if(Joy.on || 'ontouchstart' in window){
    C.globalAlpha=0.25;
    C.strokeStyle=P.white; C.lineWidth=1; C.beginPath(); C.arc(60,230,22,0,Math.PI*2); C.stroke();
    C.fillStyle=P.white; C.beginPath(); C.arc(60+Joy.dx,230+Joy.dy,8,0,Math.PI*2); C.fill();
    // A btn
    C.strokeStyle='#fb7185'; C.beginPath(); C.arc(410,215,16,0,Math.PI*2); C.stroke();
    C.fillStyle='#fb7185'; C.font='12px sans-serif'; C.textAlign='center'; C.textBaseline='middle'; C.fillText('A',410,215);
    // B btn (run)
    C.strokeStyle='#60a5fa'; C.beginPath(); C.arc(440,245,14,0,Math.PI*2); C.stroke();
    C.fillStyle='#60a5fa'; C.fillText('B',440,245);
    C.globalAlpha=1; C.textAlign='left'; C.textBaseline='top';
  }

  // stalker proximity vignette tint
  if(area===2 && stalker.on){
    const dd=Math.hypot(player.x-stalker.x,player.y-stalker.y);
    if(dd<90){ C.fillStyle=`rgba(120,20,20,${1-dd/90})`; C.fillRect(0,0,W,H); }
  }
}

function drawPlayerSprite(x,y){
  C.save(); C.translate(Math.floor(x),Math.floor(y));
  const bob=player.moving?Math.sin(player.step*0.55)*2.2:Math.sin(tick*0.06)*0.7;
  const breathe=(!player.moving&&player.idle>90)?Math.sin(tick*0.18)*1.0:0;
  const face=player.dir;
  const scared = (area===2 && stalker.on && Math.hypot(player.x-stalker.x,player.y-stalker.y)<70);

  C.fillStyle='rgba(0,0,0,.4)'; C.fillRect(-5,8,10,3); // shadow

  // legs
  C.fillStyle=P.pants;
  if(player.moving){
    const s=Math.sin(player.step*0.55);
    C.fillRect(-4.5, 3.5+Math.max(0,s), 3, 4.5-Math.abs(s)*0.6);
    C.fillRect(1.5, 3.5+Math.max(0,-s), 3, 4.5-Math.abs(s)*0.6);
  }else if(player.idle>120){
    const sh=Math.sin(tick*0.15)*2;
    C.fillRect(-4.5+sh,3.5,3,4.5); C.fillRect(1.5-sh,3.5,3,4.5);
    // scratch head
    if(tick%240<120){ C.fillStyle=P.skin; C.fillRect(face===1?5:-7, -5+bob+breathe, 2, 3); }
  }else{
    C.fillRect(-4.5,3.5,3,4.5); C.fillRect(1.5,3.5,3,4.5);
  }

  // body (hoodie)
  C.fillStyle=player.run?'#3b62d6':P.player; // darken when running? maybe not needed
  C.fillStyle=P.player;
  C.fillRect(-5.5, -1+bob+breathe, 11, 8);
  // pocket
  C.fillStyle='#3355cc'; C.fillRect(2, 0+bob+breathe, 3, 3);

  // arms
  C.fillStyle='#3b62d6';
  const arm = player.moving ? Math.sin(player.step*0.55)*3 : Math.sin(tick*0.06)*0.8;
  C.fillRect(-7-arm, -0.5+bob+breathe, 2.5, 5.5);
  C.fillRect(4.5+arm, -0.5+bob+breathe, 2.5, 5.5);

  // head
  C.fillStyle=P.skin; C.fillRect(-5, -7.5+bob+breathe, 10, 7);
  // hood over head
  C.fillStyle=P.player; C.fillRect(-6, -10+bob+breathe, 12, 4);
  // hair sticking out
  C.fillStyle=P.hair; C.fillRect(-5.5, -11+bob+breathe, 11, 3);
  if(face===1) C.fillRect(3, -11+bob+breathe, 3, 5);
  else C.fillRect(-6, -11+bob+breathe, 3, 5);

  // eyes
  C.fillStyle='#111';
  if(scared){
    // wide eyes
    C.fillStyle='#fff'; C.fillRect(face===1?0:-2, -7+bob+breathe, 3, 3.5);
    C.fillStyle='#111'; C.fillRect(face===1?0.5:-1.5, -6.5+bob+breathe, 2, 3);
  }else{
    C.fillRect(face===1?0.5:-2, -5.5+bob+breathe, 2, 2);
  }

  // mouth
  C.fillStyle='#5c1a1a';
  if(scared) C.fillRect(-1.5, -2+bob+breathe, 3, 2.5); // open
  else if(player.idle>90 && !player.moving && Math.sin(tick*0.05)>0) C.fillRect(-1.5, -2+bob+breathe, 3, 1.2);
  else C.fillRect(-1, -2+bob+breathe, 2, 1);

  // sweat drop if scared
  if(scared){ C.fillStyle=P.milo; C.fillRect(face===1?4:-5, -9+bob+breathe, 1.5, 2.5); }

  C.restore();
}

function drawTitle(){
  C.fillStyle=P.black; C.fillRect(0,0,W,H);
  // static noise
  for(let i=0;i<60;i++){
    C.fillStyle=`rgba(255,255,255,${Math.random()*0.04})`;
    C.fillRect(Math.random()*W,Math.random()*H,2,2);
  }
  const bob=Math.sin(tick*0.07)*3;
  C.fillStyle=P.white; C.font='24px monospace'; C.textAlign='center'; C.textBaseline='middle';
  C.fillText('DEAD_HALL.EXE',W/2,85+bob);
  C.fillStyle=P.gray; C.font='10px monospace';
  C.fillText('made with insomnia and energy drinks',W/2,118);
  C.fillText('move: WASD / arrows    A: interact    B: run',W/2,132);
  if(Math.floor(tick/35)%2===0){
    C.fillStyle='#fb7185'; C.fillText('PRESS SPACE / TAP A TO START',W/2,165);
  }
  // tiny player idle
  C.save(); C.translate(W/2,195); drawPlayerSprite(0,0); player.idle=200; player.step=tick; C.restore();
  player.idle=0; player.step=0; C.textAlign='left';
}

function drawWin(title,sub){
  C.fillStyle=P.black; C.fillRect(0,0,W,H);
  // sit still
  C.fillStyle=P.white; C.font='16px monospace'; C.textAlign='center'; C.textBaseline='middle';
  C.fillText('THE END - '+title,W/2,100);
  C.fillStyle=P.gray; C.font='10px monospace';
  C.fillText(sub,W/2,126);
  if(Math.floor(tick/35)%2===0){
    C.fillStyle=P.redeye; C.fillText('press SPACE / A to restart',W/2,160);
  }
  C.textAlign='left';
}

function drawDead(){
  C.fillStyle='rgba(60,10,10,0.65)'; C.fillRect(0,0,W,H);
  // glitch bars
  for(let i=0;i<8;i++){
    C.fillStyle=`rgba(0,0,0,${Math.random()})`;
    C.fillRect(0,Math.random()*H,W,Math.random()*8+2);
  }
  C.fillStyle='#fff'; C.font='14px monospace'; C.textAlign='center'; C.textBaseline='middle';
  C.fillText('IT CAUGHT YOU.',W/2,H/2-10);
  C.fillStyle=P.gray; C.font='9px monospace';
  C.fillText('try again...',W/2,H/2+10);
  C.textAlign='left';
}

// ==============================================================
// LOOP
// ==============================================================
function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
