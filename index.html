<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>snack run !!</title>
<!-- hey!! i made this late at night. hope it makes u smile -->
<style>
  body {
    margin: 0;
    background: #2a2a35;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', Courier, monospace;
    color: #fb7185;
  }
  #gameBox {
    position: relative;
    box-shadow: 0 0 0 4px #1e1e24, 0 0 24px rgba(0,0,0,0.35);
  }
  canvas {
    display: block;
    width: 640px;
    height: 480px;
    image-rendering: pixelated; /* crunchy!! */
    background: #f7f5e6;
  }
  .note {
    margin-top: 14px;
    font-size: 13px;
    color: #86efac;
  }
</style>
</head>
<body>
<div id="gameBox">
  <canvas id="c" width="160" height="120"></canvas>
</div>
<div class="note">move: WASD / arrows &nbsp;•&nbsp; talk / accept: SPACE</div>

<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ---- palette ----
const P = {
  bg: '#f7f5e6',
  road: '#e8e4d0',
  grass: '#86efac',
  dark: '#1e1e24',
  pink: '#fb7185',
  skin: '#fdba74',
  wood: '#d97706',
  water: '#60a5fa',
  egg: '#fcd34d',
  white: '#ffffff'
};

// ---- state ----
let mode = 'title'; // title, game, chat, done
let frame = 0;
let shake = 0;
let chat = null;   // {who, lines, idx, pos}
let held = null;   // whats in ur pocket
let t = 0;         // timer

// ---- input (single-press + held) ----
const keys = {};
const hit = {};
window.addEventListener('keydown', e => {
  if (!keys[e.code]) hit[e.code] = true;
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.code] = false);

// ---- helpers ----
function box(x, y, w, h, c) {
  ctx.fillStyle = c;
  ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
}
function collide(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function dust(x, y, col, n) {
  n = n || 3;
  for (let i=0;i<n;i++) bits.push({
    x: x+Math.random()*6, y: y+Math.random()*4,
    vx: (Math.random()-0.5), vy: (Math.random()-0.5)-0.3,
    life: 18+Math.random()*10, col: col||P.white
  });
}
function poof(x, y) {
  for (let i=0;i<14;i++) bits.push({
    x, y,
    vx: (Math.random()-0.5)*3.5, vy: (Math.random()-0.5)*3.5,
    life: 28,
    col: [P.pink, P.egg, P.grass, P.white][Math.floor(Math.random()*4)]
  });
}

// ---- player ----
const dude = {x:76, y:105, w:8, h:9, vx:0, vy:0, face:1, step:0};

let things = [];
let bits = [];

function start() {
  mode = 'game';
  held = null;
  t = 0;
  frame = 0;
  bits = [];
  dude.x = 76; dude.y = 106;
  dude.step = 0;

  things = [
    {k:'house', x:56, y:82, w:48, h:28},
    {k:'store', x:56, y:8, w:48, h:28},
    {k:'pond', x:14, y:40, w:30, h:18},
    {k:'rock', x:130, y:62, w:6, h:5},
    {k:'rock', x:28, y:72, w:5, h:4},
    {k:'flower', x:44, y:52, f:0},
    {k:'flower', x:112, y:58, f:2},
    {k:'flower', x:126, y:88, f:4},
    {k:'mom', x:76, y:88, w:8, h:10, lines:["hey kiddo!!","we r out of EGGS...","could u grab one??","store is up north!!"], tx:0},
    {k:'clerk', x:76, y:20, w:8, h:10, lines:["oh! hi!!","one EGG??","here ya go ^_^"], shop:true, tx:0},
    {k:'squirrel', x:122, y:70, w:6, h:5, lines:["*panicked screech*"], tx:0, run:true},
    {k:'sign', x:128, y:12, w:4, h:6, lines:["-> store"]},
    {k:'mailbox', x:120, y:94, w:4, h:8, lines:["no mail today.."]}
  ];
}

function tick() {
  frame++;
  if (shake) shake--;

  // ---- TITLE ----
  if (mode === 'title') {
    if (hit.Space) { hit.Space = false; start(); }
    return;
  }

  // ---- DONE ----
  if (mode === 'done') {
    if (hit.Space) { hit.Space = false; mode = 'title'; }
    return;
  }

  // ---- CHAT ----
  if (mode === 'chat') {
    if (hit.Space) {
      hit.Space = false;
      chat.idx++;
      chat.pos = 0;
      if (chat.idx >= chat.lines.length) {
        mode = 'game';
        chat = null;
      }
    }
    for (let b of bits) { b.x+=b.vx; b.y+=b.vy; b.life--; }
    bits = bits.filter(b => b.life > 0);
    return;
  }

  // ---- PLAY ----
  t++;
  let mx = 0, my = 0;
  if (keys.ArrowUp || keys.KeyW) my = -0.9;
  if (keys.ArrowDown || keys.KeyS) my = 0.9;
  if (keys.ArrowLeft || keys.KeyA) mx = -0.9;
  if (keys.ArrowRight || keys.KeyD) mx = 0.9;
  if (mx && my) { mx *= 0.7; my *= 0.7; }

  if (mx) dude.face = mx > 0 ? 1 : -1;
  if (mx || my) {
    dude.step++;
    if (dude.step % 10 === 0) dust(dude.x+3, dude.y+8, P.grass, 2);
  } else {
    dude.step = 0;
  }

  dude.x += mx; dude.y += my;
  dude.x = Math.max(0, Math.min(152, dude.x));
  dude.y = Math.max(0, Math.min(111, dude.y));

  // world collision
  for (let o of things) {
    if (o.k==='house'||o.k==='store'||o.k==='rock'||o.k==='pond') {
      if (collide(dude.x,dude.y,dude.w,dude.h,o.x,o.y,o.w,o.h)) {
        dude.x -= mx; dude.y -= my;
        if (mx||my) shake = 5;
      }
    }
  }

  // npc animations
  for (let o of things) {
    if ('tx' in o) o.tx += 0.08;
    if (o.k==='squirrel' && o.run) {
      let dx = dude.x - o.x, dy = dude.y - o.y;
      if (Math.abs(dx)<26 && Math.abs(dy)<26) {
        o.x += (dx>0?-0.7:0.7);
        o.y += (dy>0?-0.2:0.2);
      }
    }
  }

  // interact
  if (hit.Space) {
    hit.Space = false;
    let near = things.find(o => o.lines && collide(dude.x-6,dude.y-6,dude.w+12,dude.h+12,o.x-2,o.y-2,o.w+4,o.h+4));
    if (near) {
      if (near.shop && !held) {
        held = 'EGG';
        near.lines = ["all out now!!","have a good one~"];
        poof(dude.x, dude.y);
      }
      if (near.k === 'mom' && held) {
        mode = 'done';
        return;
      }
      mode = 'chat';
      chat = {who: near, lines: [...near.lines], idx: 0, pos: 0};
    }
  }

  // particles
  for (let b of bits) { b.x+=b.vx; b.y+=b.vy; b.life--; }
  bits = bits.filter(b => b.life > 0);
}

// ---- DRAW ----
function draw() {
  ctx.save();
  if (shake) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);

  // bg / road / grass
  box(0,0,160,120,P.bg);
  box(70,0,20,120,P.road);
  ctx.fillStyle = P.grass;
  for (let i=0;i<160;i+=20) for (let j=0;j<120;j+=20) if ((i^j)%40===0) ctx.fillRect(i+4,j+4,2,2);

  if (mode === 'title') {
    drawTitle();
    ctx.restore();
    return;
  }

  // things
  for (let o of things) {
    if (o.k === 'house') {
      box(o.x, o.y, o.w, o.h, P.wood);
      box(o.x+4, o.y+4, o.w-8, o.h-8, '#b45309');
      box(o.x+20, o.y+18, 8, 10, P.dark); // door
      ctx.fillStyle = '#fbbf24';
      ctx.fillRect(o.x+6, o.y+8, 6, 6);
      ctx.fillRect(o.x+34, o.y+8, 6, 6);
    } else if (o.k === 'store') {
      box(o.x, o.y, o.w, o.h, '#fca5a5');
      box(o.x+4, o.y+4, o.w-8, o.h-8, '#f87171');
      box(o.x+20, o.y+18, 8, 10, P.dark);
      box(o.x+10, o.y+6, 28, 6, P.pink);
      box(o.x+6, o.y+18, 6, 6, P.white);
      box(o.x+34, o.y+18, 6, 6, P.white);
    } else if (o.k === 'pond') {
      box(o.x, o.y, o.w, o.h, P.water);
      if (frame%60<30) box(o.x+6, o.y+6, 4, 2, '#93c5fd');
      if (frame%90<20) box(o.x+16, o.y+11, 3, 1, '#93c5fd');
    } else if (o.k === 'rock') {
      box(o.x, o.y, o.w, o.h, '#78716c');
      box(o.x+1, o.y-1, o.w-2, 2, '#a8a29e');
    } else if (o.k === 'flower') {
      let b = Math.sin(frame*0.12 + (o.f||0))*1.5;
      box(o.x, o.y+b, 4, 4, P.pink);
      box(o.x+1, o.y+1+b, 2, 2, '#fcd34d');
    } else if (o.k === 'mailbox') {
      box(o.x, o.y, o.w, o.h, P.wood);
      box(o.x-1, o.y, o.w+2, 3, '#ef4444');
    } else if (o.k === 'sign') {
      box(o.x, o.y, o.w, o.h, P.wood);
      box(o.x-2, o.y+2, o.w+4, 3, P.white);
    } else if (o.k === 'mom' || o.k === 'clerk') {
      let b = Math.sin(o.tx||0)*1;
      box(o.x, o.y+b, o.w, o.h-2, P.skin);
      box(o.x, o.y+o.h-2+b, o.w, 2, o.k==='mom'?P.pink:'#60a5fa');
      box(o.x+2, o.y+2+b, 1, 2, P.dark);
      box(o.x+5, o.y+2+b, 1, 2, P.dark);
      ctx.fillStyle = P.dark;
      ctx.fillRect(o.x+2, o.y+5+b, 4, 1);
      box(o.x, o.y+b, o.w, 2, P.dark); // hair
    } else if (o.k === 'squirrel') {
      box(o.x, o.y, o.w, o.h, '#92400e');
      box(o.x+o.w-2, o.y-2, 2, 5, '#92400e');
      box(o.x+1, o.y+1, 1, 1, '#fcd34d');
    }
  }

  // dude
  let db = Math.sin(dude.step * 0.6)*1;
  box(dude.x, dude.y+db, dude.w, dude.h, P.dark);
  box(dude.x+2, dude.y+2+db, 2, 2, P.bg);
  box(dude.x+5, dude.y+2+db, 2, 2, P.bg);
  box(dude.x+3, dude.y+5+db, 2, 1, P.pink); // tiny smile
  if (dude.step) {
    let f = Math.floor(dude.step/6)%2;
    box(dude.x+1, dude.y+8+db, 2, 2-f, P.dark);
    box(dude.x+5, dude.y+8+db, 2, 1+f, P.dark);
  } else {
    box(dude.x+2, dude.y+8+db, 1, 2, P.dark);
    box(dude.x+5, dude.y+8+db, 1, 2, P.dark);
  }

  // held item icon
  if (held) {
    box(138, 4, 18, 12, P.dark);
    box(140, 6, 9, 8, P.egg);
    box(147, 5, 2, 2, P.white);
  }

  // particles
  for (let b of bits) box(b.x, b.y, 1, 1, b.col);

  // chat box
  if (mode === 'chat' && chat) {
    box(4, 94, 152, 23, 'rgba(30,30,36,0.92)');
    ctx.strokeStyle = P.pink;
    ctx.lineWidth = 1;
    ctx.strokeRect(4, 94, 152, 23);

    let line = chat.lines[chat.idx];
    if (chat.pos < line.length && frame%3===0) chat.pos++;
    let txt = line.substring(0, chat.pos);
    ctx.fillStyle = P.white;
    ctx.font = '10px monospace';
    ctx.fillText(txt, 10, 109);
    if (chat.pos >= line.length && Math.floor(frame/25)%2) ctx.fillText('▼', 145, 114);
  }

  // done screen
  if (mode === 'done') {
    box(20, 34, 120, 52, 'rgba(30,30,36,0.92)');
    ctx.strokeStyle = P.pink; ctx.lineWidth=1; ctx.strokeRect(20,34,120,52);
    ctx.fillStyle = P.pink; ctx.font='12px monospace'; ctx.fillText('YOU DID IT!!', 52, 56);
    ctx.fillStyle = P.white; ctx.font='10px monospace';
    ctx.fillText('moms making eggs now', 30, 72);
    ctx.fillText('time: '+(t/60).toFixed(1)+'s', 58, 86);
    if (Math.floor(frame/30)%2) ctx.fillText('press SPACE', 52, 98);
  }

  ctx.restore();
}

function drawTitle() {
  let w = Math.sin(frame*0.08)*2;
  ctx.fillStyle = P.pink; ctx.font='16px monospace'; ctx.fillText('SNACK RUN', 42, 38+w);
  ctx.fillStyle = P.dark; ctx.font='10px monospace';
  ctx.fillText('a game by someone who', 24, 60);
  ctx.fillText('should be asleep rn', 40, 72);
  if (Math.floor(frame/40)%2) {
    ctx.fillStyle = P.pink; ctx.fillText('press SPACE to start !!', 22, 100);
  }
  // idle lil dude
  let bx = Math.sin(frame*0.15)*2;
  box(76, 82, 8, 8, P.dark);
  box(78, 84, 2, 2, P.bg); box(81, 84, 2, 2, P.bg);
  box(79, 87, 2, 1, P.pink);
  box(77, 90+bx, 1, 2, P.dark); box(82, 90-bx, 1, 2, P.dark);
}

function loop() { tick(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html
